name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'fly.toml'
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy webclaw
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only --app webclaw
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - run: flyctl status --app webclaw
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
