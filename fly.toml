# OpenClaw Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "webclaw"
primary_region = "dfw" # Dallas — closest Fly region to Monterrey

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
OPENCLAW_CONFIG_PATH = "/data/openclaw.json"
NODE_OPTIONS = "--max-old-space-size=1536"
NODE_COMPILE_CACHE = "/data/.node-cache"
OPENCLAW_NO_RESPAWN = "1"
PATH = "/data/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
RCLONE_CONFIG = "/data/.config/rclone/rclone.conf"
LANGFUSE_HOST = "https://cloud.langfuse.com"

[processes]
app = "node dist/index.js gateway --allow-unconfigured --port 3000 --bind lan"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false # Gateway must stay always on
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "120s"
  method = "GET"
  path = "/health"

[[restart]]
  policy = "always"

[[vm]]
size = "shared-cpu-2x"
memory = "4gb"

[mounts]
source = "openclaw_data"
destination = "/data"
